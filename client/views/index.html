<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>Join Chatroom</title>

		<script src="https://cdn.tailwindcss.com"></script>
	</head>
	<body class="bg-slate-100 min-h-screen flex items-center justify-center">

		<div class="w-full max-w-sm rounded-xl bg-white p-8 shadow-lg">
			<div class="mb-8 text-center">
				<h1 class="text-3xl font-bold text-slate-800">
					💬 Chatroom
				</h1>
				<p class="mt-2 text-sm text-slate-500">
					Enter a username to join
				</p>
			</div>

			<form method="POST" class="space-y-5">
				<div>
					<label
						for="username"
						class="mb-2 block text-sm font-medium text-slate-700">
						Username
					</label>

					<input
						id="username"
						name="username"
						type="text"
						maxlength="20"
						required
						autofocus
						placeholder=""
						class="w-full rounded-lg border border-slate-300 px-4 py-3 outline-none transition focus:border-blue-500 focus:ring-2 focus:ring-blue-500"
					>
				</div>

				<button
					type="submit"
					class="w-full rounded-lg bg-blue-600 py-3 font-semibold text-white transition hover:bg-blue-700 active:scale-[0.98]">
					Join Chat
				</button>

			</form>
		</div>

	</body>
</html>
