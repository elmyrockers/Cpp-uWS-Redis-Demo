<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>Public Chatroom</title>

		<script src="https://cdn.tailwindcss.com"></script>
	</head>

	<body class="h-screen bg-slate-100">
		<div x-data="app" class="flex h-full">

			<!-- ===================== SIDEBAR ===================== -->
			<aside class="w-72 bg-slate-900 text-white flex flex-col">
				<!-- Header -->
				<div class="border-b border-slate-700 p-5">
					<h1 class="text-xl font-bold">💬 Public Chat</h1>
					<p class="text-sm text-slate-400 mt-1 ml-1"><span x-text="onlineUsers.length"></span> user<span x-show="onlineUsers.length>1">s</span> online</p>
				</div>
				<!-- Users -->
				<div class="flex-1 overflow-y-auto">
					<h2 class="px-5 py-3 text-xs uppercase tracking-wider text-slate-400">
						Online Users
					</h2>
					<ul class="space-y-1">
						<template x-for="username in onlineUsers">
							<li class="flex items-center gap-3 px-5 py-0 hover:bg-slate-800">
								<span class="h-2 w-2 rounded-full bg-green-500"></span>
								<span x-text="username"></span>
							</li>
						</template>
					</ul>
				</div>
				<!-- Typing indicator -->
				<div class="border-t border-slate-700 p-4 text-sm text-slate-300" x-show="typingUsers.length">
					<span x-show="typingUsers.length == 1">
						<span class="font-semibold text-white">1 person</span> is
					</span>
					<span x-show="typingUsers.length > 1">
						<span class="font-semibold text-white"><span x-text="typingUsers.length"></span> people</span> are
					</span>
					typing
					<span class="inline-flex gap-1 ml-1">
						<span class="w-1 h-1 bg-slate-300 rounded-full animate-bounce"></span>
						<span class="w-1 h-1 bg-slate-300 rounded-full animate-bounce [animation-delay:150ms]"></span>
						<span class="w-1 h-1 bg-slate-300 rounded-full animate-bounce [animation-delay:300ms]"></span>
					</span>
				</div>
			</aside>

			<!-- ===================== CHAT AREA ===================== -->
			<main class="flex flex-1 flex-col">
				<!-- Header -->
					<header class="border-b bg-white px-6 py-4 shadow-sm">
						<h2 class="text-lg font-semibold">Public Chatroom</h2>
					</header>
				<!-- MESSAGES -->
					<div class="flex-1 overflow-y-auto p-5" x-ref="chat">
						<template x-for="(message,id) in messages">
							<!-- MESSAGE -->
								<div class="space-y-1" 
										x-data="{ username: '', prevUsername: '', sameUsername: false }"
										x-init="
											username = message.username;
											prevUsername = id > 0 ? messages[id - 1].username : '';
											sameUsername = username === prevUsername;
										" :class="id > 0 && !sameUsername ? 'mt-3' : ''" :data-prev-username="prevUsername" :data-username="username">
									<!-- top row -->
										<span class="font-semibold text-blue-600" :class="colors[username]" x-text="message.username" x-show="!sameUsername"></span>
									<!-- message bubble -->
										<div class="ml-5 mt-1">
											<div class="inline-flex items-end gap-2 bg-white rounded-lg px-4 py-2 shadow-sm text-slate-700 max-w-[70%]">
												<span x-text="message.content"></span>
												<span class="text-[10px] text-slate-400 whitespace-nowrap" x-text="formatTime(message.timestamp)"></span>
											</div>
										</div>
								</div>
						</template>
					</div>
				
				<!-- Typing preview (chat area) -->
					<div class="pl-5 py-2 text-sm text-slate-500 flex items-center gap-2" x-show="typingUsers.length">
						<span class="italic font-semibold text-slate-600" x-text="typingList"></span>
						<span class="italic -ml-0.5">
							<span x-show="typingUsers.length == 1">is</span>
							<span x-show="typingUsers.length > 1">are</span>
							typing
						</span>
						<span class="flex gap-1 relative top-0.5">
							<span class="w-1.5 h-1.5 bg-slate-400 rounded-full animate-bounce"></span>
							<span class="w-1.5 h-1.5 bg-slate-400 rounded-full animate-bounce [animation-delay:150ms]"></span>
							<span class="w-1.5 h-1.5 bg-slate-400 rounded-full animate-bounce [animation-delay:300ms]"></span>
						</span>
					</div>

				<!-- Input -->
					<form class="border-t bg-white p-4" method="post" @submit.prevent="sendMessage">
						<div class="flex gap-3">
							<input
								x-model="input"
								type="text"
								placeholder="Type a message..."
								autofocus
								class="flex-1 rounded-lg border border-slate-300 px-4 py-3 focus:border-blue-500 focus:outline-none focus:ring-2 focus:ring-blue-500">
							<button class="rounded-lg bg-blue-600 px-6 py-3 font-semibold text-white hover:bg-blue-700">Send <span>➤</span></button>
						</div>
					</form>
			</main>
		</div>
		<script src="//unpkg.com/alpinejs" defer></script>
		<script>
			document.addEventListener( 'alpine:init',()=>{
				Alpine.data( 'app',()=>({
					wsClient: {},
					onlineUsers: [],
					typingUsers: [],
					colors: {},
					messages: [],
					input: "",
					
					init(){
						this.addOnlineUser( 'Elmyrockers' );
						this.addOnlineUser( 'Alia' );
						this.addOnlineUser( 'Rosman' );
						this.addOnlineUser( 'Ahmad' );

						this.typingUsers.push( 'Alia' );
						this.typingUsers.push( 'Rosman' );
						this.typingUsers.push( 'Elmyrockers' );
						this.typingUsers.push( 'Ahmad' );

						// this.messages.push({
						// 	id: 1,
						// 	username: "Ahmad",
						// 	content: "Hi apa khabar?",
						// 	timestamp: "1234567890",
						// });
						// this.messages.push({
						// 	id: 2,
						// 	username: "Elmyrockers",
						// 	content: "Khabar baik jer",
						// 	timestamp: "1234937890",
						// });
						// this.messages.push({
						// 	id: 3,
						// 	username: "Elmyrockers",
						// 	content: "Khabar baik jer 2",
						// 	timestamp: "1234937890",
						// });
						// this.messages.push({
						// 	id: 4,
						// 	username: "Elmyrockers",
						// 	content: "hahaha",
						// 	timestamp: "1234937890",
						// });
						// this.messages.push({
						// 	id: 5,
						// 	username: "Alia",
						// 	content: "Harap segalanya akan ok",
						// 	timestamp: "1234567890",
						// });

						console.log( this.messages );

						this.wsConnect();
					},
					typingList(){
						const lastUser = this.typingUsers.at(-1);
						const otherUsers = this.typingUsers.slice(0, -1).join(', ');
						
						let list = '';
						if ( otherUsers ) list = `${otherUsers} and `;
						list += lastUser;

						return list;
					},
					formatTime( timestamp ) {
						// Convert timestamp to datetime
							const date = new Date(Number(timestamp));

							let hours = date.getHours();
							const minutes = date.getMinutes().toString().padStart(2, '0');

							const suffix = hours >= 12 ? "pm" : "am";
							const formattedHours = ((hours + 11) % 12 + 1); // convert 0–23 to 1–12

						return `${formattedHours}:${minutes} ${suffix}`;
					},
					getRandomTextColor() {
						const colors = [
							'text-red-600',
							'text-green-600',
							'text-blue-600',
							'text-yellow-600',
							'text-purple-600',
							'text-pink-600',
							'text-teal-600',
							'text-indigo-600',
							'text-gray-600',
							'text-orange-600',
							'text-lime-600',
							'text-cyan-600',
							'text-fuchsia-600',
							'text-violet-600',
							'text-rose-600',
						];
						return colors[Math.floor(Math.random() * colors.length)];
					},
					addOnlineUser( username ) {
						this.onlineUsers.push( username );
						this.colors[ username ] = this.getRandomTextColor();
					},
					sendMessage() {
						const message = {
							action: 'message',
							content: this.input,
						};
						this.wsClient.send( JSON.stringify(message) );

						console.log( message );
					},
					wsConnect() {
						this.wsClient = new WebSocket( "ws://localhost:9001?token={{.Token}}" );
						if ( this.wsClient.readyState == WebSocket.CONNECTING ) console.log("Still connecting...");

						this.wsClient.onopen = () => {
							console.log("Connected!");
							this.wsClient.send( "Hello. This is a message from websocket client!" );
						};

						this.wsClient.onmessage = (event) => {
							// Add new message
								const message = JSON.parse( event.data );
								if ( message.action == 'message' ) this.messages.push( message );

							// Scroll down chat area
								this.$nextTick(() => {
									this.$refs.chat.scrollTo({
										top: this.$refs.chat.scrollHeight,
										behavior: 'smooth'
									})
								})

							// Reset user input
								this.input = '';
						};

						this.wsClient.onclose = () => {
							console.log("Disconnected. Reconnecting in 3s...");
							setTimeout(() => this.wsConnect(), 3000);
						};

						this.wsClient.onerror = (err) => {
							console.error("WebSocket error:", err);
							this.wsClient.close(); // trigger onclose then reconnect
						};
					},
				}));
			});
		</script>
	</body>
</html>
